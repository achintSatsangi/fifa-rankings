<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded-square background: matches the app's brand chip color
       (--btn-bg in dark mode). Reads well on both light and dark
       browser tab bars because tab chrome sits behind it. -->
  <rect width="64" height="64" rx="14" fill="#161412"/>
  <!-- Faint circular arc: nod to the app's circular bracket motif.
       Barely there at 16px, visible at 32px+. -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
  <!-- Trophy silhouette. Same geometric grammar as TrophyIcon in
       src/components/NavIcons.tsx, but filled for solidity at small
       sizes. Centered inside the arc. -->
  <g fill="#ede8e4">
    <!-- cup body: rounded top, tapered slightly toward the base -->
    <path d="M22 18 h20 v10 a10 10 0 0 1 -20 0 z"/>
    <!-- stem -->
    <rect x="30" y="38" width="4" height="6"/>
    <!-- base -->
    <rect x="24" y="44" width="16" height="3" rx="1"/>
    <!-- left handle -->
    <path d="M22 18 h-4 v4 a5 5 0 0 0 5 5 v-2 a3 3 0 0 1 -3 -3 v-2 h2 z"/>
    <!-- right handle -->
    <path d="M42 18 h4 v4 a5 5 0 0 1 -5 5 v-2 a3 3 0 0 0 3 -3 v-2 h-2 z"/>
  </g>
</svg>
