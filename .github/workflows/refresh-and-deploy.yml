name: Scheduled refresh + Pages deploy

# Two scheduled triggers:
#   - Every hour at :02 — score refresh + FIFA-only highlight fallback.
#     Fast, cheap, no YouTube quota consumed. This is the workhorse.
#   - Once a night at 19:02 UTC (~21:00 in CEST / Norway summertime) —
#     same as above PLUS a YouTube API pass to pick up any new
#     canonical highlight uploads. Only one YouTube burn per 24h.
# The nightly cron is distinguished at step level via
# `github.event.schedule`, which passes FORCE_YOUTUBE_FETCH=true to
# resolve-highlights.mjs.
# Also fires on push to main and on manual dispatch (manual dispatch
# honours the manual flag in scripts/config/youtube-fetch.json).
on:
  schedule:
    - cron: "2 * * * *"
    - cron: "2 19 * * *"
  push:
    branches: [main]
  workflow_dispatch:

# `contents: write` so the auto-refresh commit can push back to main.
# `pages: write` + `id-token: write` are what actions/deploy-pages needs.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time; queue further runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # pnpm version comes from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh live data
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/refresh-live.mjs

      # After scores refresh, look up any newly-played matches on the
      # FIFA YouTube channel. Skipped when the secret is unset so the
      # workflow keeps working without the key.
      - name: Resolve match highlights
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && env.YOUTUBE_API_KEY != '' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Nightly cron enables YouTube fetching regardless of the
          # scripts/config/youtube-fetch.json flag; hourly cron leaves
          # it alone (falls back to FIFA-only unless flag is manually
          # set). Manual dispatch honours the file flag as before.
          FORCE_YOUTUBE_FETCH: ${{ github.event.schedule == '2 19 * * *' && 'true' || 'false' }}
        run: node scripts/resolve-highlights.mjs

      - name: Commit refreshed data (if changed)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          # Includes scripts/config so the auto-reset of the one-shot
          # YouTube fetch flag (scripts/config/youtube-fetch.json) gets
          # committed alongside any data changes it produced.
          if [[ -n "$(git status --porcelain src/data scripts/config)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data scripts/config
            git commit -m "chore(data): scheduled refresh (scores + highlights)"
            git push
          else
            echo "No data or config changes."
          fi

      - name: Build
        env:
          PUBLIC_BASE: /fifa-rankings/
          # Pass through to a shell var so we can fall back to `date`
          # if the expression evaluates to empty (which shipped as an
          # empty buildTimestamp in version.json until the fallback was
          # added — the freshness chip renders null when it's missing).
          RUN_STARTED_AT: ${{ github.run_started_at }}
        run: |
          export VITE_BUILD_TIMESTAMP="${RUN_STARTED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          echo "Building with VITE_BUILD_TIMESTAMP=$VITE_BUILD_TIMESTAMP"
          pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
