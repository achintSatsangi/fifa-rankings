name: Scheduled refresh + Pages deploy

# Runs every 30 minutes at :02/:32 — offset from the top of the hour
# because GitHub Actions runs are noticeably delayed at :00 due to
# fleet-wide load. Also fires on push to main and on manual dispatch.
# Scheduled runs pull fresh scores from football-data.org, commit any
# JSON changes, then build and deploy to GitHub Pages.
on:
  schedule:
    - cron: "2,32 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

# `contents: write` so the auto-refresh commit can push back to main.
# `pages: write` + `id-token: write` are what actions/deploy-pages needs.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time; queue further runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # pnpm version comes from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh live data
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/refresh-live.mjs

      # After scores refresh, look up any newly-played matches on the
      # FIFA YouTube channel. Skipped when the secret is unset so the
      # workflow keeps working without the key.
      - name: Resolve match highlights
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && env.YOUTUBE_API_KEY != '' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/resolve-highlights.mjs

      - name: Commit refreshed data (if changed)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          # Includes scripts/config so the auto-reset of the one-shot
          # YouTube fetch flag (scripts/config/youtube-fetch.json) gets
          # committed alongside any data changes it produced.
          if [[ -n "$(git status --porcelain src/data scripts/config)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data scripts/config
            git commit -m "chore(data): scheduled refresh (scores + highlights)"
            git push
          else
            echo "No data or config changes."
          fi

      - name: Build
        env:
          PUBLIC_BASE: /fifa-rankings/
          # github.run_started_at is ISO 8601 UTC — used by the app to
          # show "Data updated Nm ago" in the sidebar. Close enough to
          # the refresh timestamp since refresh runs seconds earlier in
          # the same job.
          VITE_BUILD_TIMESTAMP: ${{ github.run_started_at }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
